server {
    listen 80;
    server_name ruirufactorymabati.com www.ruirufactorymabati.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ruirufactorymabati.com www.ruirufactorymabati.com;

    ssl_certificate /etc/letsencrypt/live/ruirufactorymabati.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ruirufactorymabati.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static frontend files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache immutable Vite assets aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Basic compression for text responses
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
