services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mabati-yetu-web
    restart: unless-stopped
    expose:
      - "80"

  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: mabati-yetu-proxy
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/proxy/http.conf:/etc/nginx/conf.d/http.conf:ro
      - ./nginx/proxy/https.conf:/etc/nginx/conf.d/https.conf:ro
      - certbot-webroot:/var/www/certbot
      - certbot-etc:/etc/letsencrypt
    command: >
      /bin/sh -c '
      if ls /etc/letsencrypt/live/*/fullchain.pem >/dev/null 2>&1; then
        cp /etc/nginx/conf.d/https.conf /etc/nginx/conf.d/default.conf;
      else
        cp /etc/nginx/conf.d/http.conf /etc/nginx/conf.d/default.conf;
      fi &&
      nginx -g "daemon off;"'

  certbot:
    image: certbot/certbot:latest
    container_name: mabati-yetu-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-etc:/etc/letsencrypt

volumes:
  certbot-webroot:
  certbot-etc:
